<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contact Us | SKILLTECH</title>
    <style>
        /* General Settings */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        /* Body Fix for Mobile Stability */
        body { 
            background-color: #f0f7ff; 
            color: #333; 
            overflow-x: hidden; 
            width: 100%;
            position: relative;
        }

        /* Updated Navigation */
        nav {
            background: #fff; padding: 15px 10%; display: flex;
            justify-content: space-between; align-items: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1000;
            width: 100%;
        }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .brand-circle {
            width: 40px; height: 40px; background-color: #0d47a1;
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; color: white; font-weight: bold; font-size: 18px;
            border: 2px solid #bbdefb;
        }
        .logo-text { font-size: 24px; font-weight: bold; color: #0d47a1; letter-spacing: 2px; }
        
        nav ul { display: flex; list-style: none; gap: 15px; }
        nav ul li a { 
            text-decoration: none; 
            color: #1565c0; 
            font-weight: 600; 
            padding: 10px 22px;
            border-radius: 12px;
            background: #ffffff;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid #e3f2fd;
            font-size: 14px;
            display: inline-block;
        }
        nav ul li a:hover { 
            background: #2196f3; 
            color: white; 
            transform: translateY(-6px); 
            box-shadow: 0 10px 20px rgba(33, 150, 243, 0.3);
            border-color: #2196f3;
        }

        /* Contact Section */
        .contact-container { padding: 80px 10%; text-align: center; width: 100%; }
        .contact-card {
            background: #fff; max-width: 550px; margin: 0 auto;
            padding: 50px 30px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(33, 150, 243, 0.1);
            border-top: 5px solid #2196f3;
        }
        .contact-card h1 { color: #0d47a1; margin-bottom: 20px; }
        
        .contact-btn {
            background: #2196f3; color: white; padding: 15px 30px;
            text-decoration: none; border-radius: 8px; font-weight: bold;
            display: block; margin-top: 20px; transition: 0.3s;
            box-shadow: 0 4px 12px rgba(33, 150, 243, 0.2);
        }
        .contact-btn:hover { background: #0d47a1; transform: translateY(-3px); }

        .btn-home { 
            margin-top: 40px; display: inline-block; 
            color: #2196f3; text-decoration: none; 
            font-weight: bold; transition: 0.3s;
        }
        .btn-home:hover { color: #0d47a1; transform: scale(1.05); }

        footer { background: #fff; padding: 25px; text-align: center; border-top: 1px solid #e3f2fd; font-size: 14px; color: #999; margin-top: 50px; width: 100%; }

        /* MOBILE VERSION (Responsive Design Fixes) */
        @media (max-width: 768px) {
            nav { padding: 15px 5%; flex-direction: column; gap: 15px; text-align: center; }
            nav ul { gap: 5px; flex-wrap: wrap; justify-content: center; width: 100%; }
            nav ul li a { padding: 8px 10px; font-size: 11px; }

            .contact-container { padding: 40px 5%; }
            .contact-card { padding: 30px 20px; width: 100%; }
            .contact-card h1 { font-size: 24px; }
            .contact-card p { font-size: 14px; }
            
            .contact-btn { padding: 12px 20px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-area">
            <div class="brand-circle">SF</div>
            <span class="logo-text">SKILLTECH</span>
        </div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="work.html">Work</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="contact-container">
        <div class="contact-card">
            <h1>Get In Touch</h1>
            <p>Ready to start your next digital project? Contact **SKILLTECH** today for expert SEO, Design, and AI solutions.</p>
            
            <!-- Apna WhatsApp Number yahan update kar dein -->
            <a href="https://wa.me" class="contact-btn">Message on WhatsApp</a>
            <p style="margin-top: 25px; color: #777; font-size: 14px;">Email: contact@skilltech.com</p>
        </div>
        <a href="index.html" class="btn-home">← Back to Home Page</a>
    </div>

    <footer>
        © 2026 SKILLTECH - All Rights Reserved
    </footer>

</body>
</html>
