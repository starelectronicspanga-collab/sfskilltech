<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKILLTECH | Shakeel Ahmed Khan</title>
   <style>
    /* Baki sara global design wahi hai... */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background-color: #f0f7ff; color: #333; overflow-x: hidden; }
    
    nav { background: #fff; padding: 15px 10%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
    .logo-area { display: flex; align-items: center; gap: 12px; }
    
    /* TOP SF LOGO - Heartbeat */
    .brand-circle { 
        width: 40px; height: 40px; background-color: #0d47a1; border-radius: 50%; 
        display: flex; justify-content: center; align-items: center; color: white; 
        font-weight: bold; font-size: 18px; border: 2px solid #bbdefb;
        animation: heartbeat 2s ease-in-out infinite;
        position: relative;
    }

    /* --- BARI AUR WAZEH BIJLI (LIGHTNING BOLT) --- */
    .lightning-bolt {
        position: fixed;
        width: 6px;
        height: 150px; /* Length bari kar di */
        background: #ffffff;
        box-shadow: 0 0 30px #2196f3, 0 0 60px #0d47a1; /* Heavy Glow */
        top: -200px;
        left: 11%;
        opacity: 0;
        z-index: 9999;
        border-radius: 10px;
        transform: rotate(5deg); /* Thora sa teercha */
        animation: strikeDownHard 0.8s ease-in forwards;
        animation-delay: 1.5s;
    }

    @keyframes strikeDownHard {
        0% { top: -200px; opacity: 0; height: 100px; }
        30% { opacity: 1; height: 250px; } /* Beech mein lambi hogi */
        100% { top: calc(100% - 90px); left: 28px; opacity: 0; height: 10px; }
    }

    /* BAKI LOGO TEXT AUR BUTTONS */
    .logo-text { font-size: 24px; font-weight: bold; color: #0d47a1; letter-spacing: 2px; }
    nav ul { display: flex; list-style: none; gap: 15px; }
    nav ul li a { text-decoration: none; color: #1565c0; font-weight: 600; padding: 10px 22px; border-radius: 12px; background: #ffffff; border: 2px solid #e3f2fd; font-size: 14px; cursor: pointer; transition: 0.3s; }
    nav ul li a:hover { background: #2196f3; color: white; transform: translateY(-5px); box-shadow: 0 5px 15px rgba(33, 150, 243, 0.3); }

    .hero { height: 80vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 0 10%; }
    .big-name { font-size: 52px; font-weight: 900; background: linear-gradient(to right, #0d47a1, #2196f3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* ASK ME BUTTON - Explosion Launch */
    .ask-btn { 
        background-color: #2196f3; width: 60px; height: 60px; border-radius: 50%; 
        display: flex; justify-content: center; align-items: center; 
        box-shadow: 0 8px 20px rgba(33, 150, 243, 0.3); color: white; 
        font-weight: bold; cursor: pointer; border: none; font-size: 14px; 
        opacity: 0;
        animation: boomAppear 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        animation-delay: 2.2s; /* Bijli girne ke foran baad */
    }

    @keyframes boomAppear {
        0% { opacity: 0; transform: scale(0) rotate(-45deg); filter: brightness(10); }
        100% { opacity: 1; transform: scale(1) rotate(0deg); filter: brightness(1); }
    }

    /* FOOTER LOGO Heartbeat */
    .footer-logo { position: fixed; bottom: 25px; right: 25px; background-color: #0d47a1; width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; animation: heartbeat 2s infinite; z-index: 999; }

    @keyframes heartbeat { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

    .ask-me-wrapper { position: fixed; bottom: 25px; left: 25px; display: flex; align-items: center; gap: 12px; z-index: 1000; }
    footer { text-align: center; padding: 25px; border-top: 1px solid #e3f2fd; color: #999; }
</style>
</head>
<body>

    <!-- BARI BIJLI -->
    <div class="lightning-bolt"></div>

    <nav>
        <div class="logo-area">
            <div class="brand-circle">SF</div>
            <span class="logo-text">SKILLTECH</span>
        </div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="work.html">Work</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <span class="big-name">Shakeel Ahmed Khan</span>
            <h1>Digital Expert & AI Specialist</h1>
            <p>Specializing in <b>SEO</b>, <b>Creative Design</b>, and <b>Smart Solutions</b>.</p>
        </div>
    </section>

    <div class="ask-me-wrapper">
        <button class="ask-btn">Ask Me</button>
    </div>

    <div class="footer-logo">SF</div>

    <footer><p>© 2026 SKILLTECH - All Rights Reserved</p></footer>

</body>
</html>
